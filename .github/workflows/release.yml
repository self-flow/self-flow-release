name: Self Flow Release

on:
  repository_dispatch:
    types: [build-release]

concurrency:
  group: self-flow-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    environment: dev

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Generate Version
        id: version
        shell: pwsh
        run: |
          $version = Get-Date -Format "yyyy.MM.dd.HHmm"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      #####################################################
      # Checkout repos
      #####################################################

      - uses: actions/checkout@v4
        with:
          repository: self-flow/self-flow-rust-action-service
          ref: dev
          path: self-flow-rust-action-service
          token: ${{ secrets.RELEASE_PAT }}

      - uses: actions/checkout@v4
        with:
          repository: self-flow/self-flow-rust-computer-use
          ref: dev
          path: self-flow-rust-computer-use
          token: ${{ secrets.RELEASE_PAT }}

      - uses: actions/checkout@v4
        with:
          repository: self-flow/self-flow-scheduler-service
          ref: dev
          path: self-flow-scheduler-service
          token: ${{ secrets.RELEASE_PAT }}

      - uses: actions/checkout@v4
        with:
          repository: self-flow/self-flow-ui
          ref: dev
          path: self-flow-ui
          token: ${{ secrets.RELEASE_PAT }}

      - uses: actions/checkout@v4
        with:
          path: self-flow-release

      #####################################################
      # Rust
      #####################################################

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build Action Service
        working-directory: self-flow-rust-action-service
        run: cargo build --release

      - name: Build Computer Use Service
        working-directory: self-flow-rust-computer-use
        run: cargo build --release

      - name: Build Scheduler Service
        working-directory: self-flow-scheduler-service
        run: cargo build --release

      #####################################################
      # Node
      #####################################################

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install UI Dependencies
        working-directory: self-flow-ui
        run: npm ci

      - name: Create UI .env
        working-directory: self-flow-ui
        shell: pwsh
        run: |
          @"
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_TOKEN_API_URL=${{ secrets.VITE_TOKEN_API_URL }}
          VITE_PAYMENT_API_URL=${{ secrets.VITE_PAYMENT_API_URL }}
          VITE_SETUP_URL=${{ secrets.VITE_SETUP_URL }}
          "@ | Out-File -Encoding utf8 .env

      - name: Verify UI .env
        working-directory: self-flow-ui
        shell: pwsh
        run: |
          if (!(Test-Path .env)) {
            throw ".env was not created"
          }
          Write-Host ".env created successfully"

      - name: Update package version
        working-directory: self-flow-ui
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.version = "0.1.${{ github.run_number }}"
          $pkg | ConvertTo-Json -Depth 100 | Set-Content package.json

          Write-Host "Updated version to $($pkg.version)"

      #####################################################
      # Package
      #####################################################

      - name: Prepare Code Signing Certificate
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.SELF_FLOW_CERTIFICATE }}")
          [IO.File]::WriteAllBytes("$env:GITHUB_WORKSPACE\SelfFlowTest.pfx", $bytes)

      # - name: Assemble Windows Package
      #   shell: pwsh
      #   run: |
      #     ./self-flow-release/scripts/assemble-windows.ps1

      - name: Verify PFX
        shell: pwsh
        run: |
          Write-Host "Workspace: $env:GITHUB_WORKSPACE"
          Test-Path "$env:GITHUB_WORKSPACE\SelfFlowTest.pfx"
          Get-ChildItem "$env:GITHUB_WORKSPACE"

      - name: Assemble Windows Package
        shell: pwsh
        env:
          CSC_LINK: ${{ github.workspace }}/SelfFlowTest.pfx
          CSC_KEY_PASSWORD: ${{ secrets.SELF_FLOW_CERT_PASSWORD }}
        run: |
          ./self-flow-release/scripts/assemble-windows.ps1

      #####################################################
      # Upload Artifact
      #####################################################

      # self-flow-ui/release/*.exe //add to below path if need to store exe files
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            self-flow-ui/release/*.exe
            self-flow-ui/release/*.appx
            self-flow-ui/release/latest*.yml

  build-macos:
    runs-on: macos-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4
        with:
          repository: self-flow/self-flow-rust-action-service
          ref: dev
          path: self-flow-rust-action-service
          token: ${{ secrets.RELEASE_PAT }}

      - uses: actions/checkout@v4
        with:
          repository: self-flow/self-flow-rust-computer-use
          ref: dev
          path: self-flow-rust-computer-use
          token: ${{ secrets.RELEASE_PAT }}

      - uses: actions/checkout@v4
        with:
          repository: self-flow/self-flow-scheduler-service
          ref: dev
          path: self-flow-scheduler-service
          token: ${{ secrets.RELEASE_PAT }}

      - uses: actions/checkout@v4
        with:
          repository: self-flow/self-flow-ui
          ref: dev
          path: self-flow-ui
          token: ${{ secrets.RELEASE_PAT }}

      - uses: actions/checkout@v4
        with:
          path: self-flow-release

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build Action Service
        working-directory: self-flow-rust-action-service
        run: cargo build --release

      - name: Build Computer Use Service
        working-directory: self-flow-rust-computer-use
        run: cargo build --release

      - name: Build Scheduler Service
        working-directory: self-flow-scheduler-service
        run: cargo build --release

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install UI Dependencies
        working-directory: self-flow-ui
        run: npm ci

      - name: Create UI .env
        working-directory: self-flow-ui
        shell: bash
        run: |
          cat > .env << EOF
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_TOKEN_API_URL=${{ secrets.VITE_TOKEN_API_URL }}
          VITE_PAYMENT_API_URL=${{ secrets.VITE_PAYMENT_API_URL }}
          VITE_SETUP_URL=${{ secrets.VITE_SETUP_URL }}
          EOF

      - name: Verify UI .env
        working-directory: self-flow-ui
        run: |
          test -f .env
          echo ".env created successfully"

      - name: Update package version
        working-directory: self-flow-ui
        shell: bash
        run: |
          node -e "
          const fs=require('fs');
          const pkg=require('./package.json');
          pkg.version='0.1.${{ github.run_number }}';
          fs.writeFileSync('package.json', JSON.stringify(pkg,null,2));
          console.log('Version:', pkg.version);
          "

      - name: Assemble Mac Package
        run: |
          chmod +x self-flow-release/scripts/assemble-macos.sh
          ./self-flow-release/scripts/assemble-macos.sh

      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: |
            self-flow-ui/release/*.dmg

  create-release:
    needs:
      - build-windows
      - build-macos

    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/windows

      - uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: artifacts/mac

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-windows.outputs.version }}
          files: |
            artifacts/windows/**
            artifacts/mac/**
